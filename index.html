<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <link rel="icon" type="image/png" href="icon-1024.png" />
    <link rel="apple-touch-icon" href="icon-1024.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Freud" />
    <meta name="theme-color" content="#062f23" />

    <title>Freud</title>

    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --bg-1: #03150f;
        --bg-2: #0b2d22;
        --panel: rgba(0, 0, 0, 0.75);
        --panel-2: rgba(0, 0, 0, 0.3);
        --input-bg: #103328;
        --user: #d4af37;
        --freud: #123c2f;
        --text: #eefaf4;
        --muted: #8fd6bb;
        --border: #d4af37;
        --code-bg: rgba(0, 0, 0, 0.25);
        --code-border: rgba(212, 175, 55, 0.28);
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      body {
        font-family: system-ui, sans-serif;
        background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
        color: var(--text);
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      header {
        background: linear-gradient(
          135deg,
          rgba(3, 21, 15, 0.92),
          rgba(11, 45, 34, 0.88)
        );
        padding: calc(12px + env(safe-area-inset-top)) 16px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border-bottom: 3px solid var(--border);
        flex: 0 0 auto;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        min-width: 0;
        flex: 1;
      }

      .header-left > div {
        min-width: 0;
      }

      .header-left h1,
      .header-left p {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .avatar {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid var(--border);
        flex: 0 0 52px;
      }

      .chat {
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        background: var(--panel-2);
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
      }

      .message {
        max-width: 80%;
        padding: 14px 20px;
        border-radius: 20px;
        line-height: 1.6;
        position: relative;
        word-break: break-word;
        overflow-wrap: anywhere;
        white-space: pre-wrap;
      }

      .user {
        align-self: flex-end;
        background: linear-gradient(135deg, #e0c15a, #c59b22);
        color: #1f1806;
        border-bottom-right-radius: 4px;
      }

      .freud {
        align-self: flex-start;
        background: linear-gradient(135deg, #123c2f, #0d2e24);
        color: var(--text);
        border-bottom-left-radius: 4px;
      }

      .voice-badge {
        position: absolute;
        left: 10px;
        top: 8px;
        font-size: 14px;
        opacity: 0.8;
      }

      .status {
        text-align: center;
        padding: 8px 12px;
        color: var(--muted);
        font-size: 0.9em;
        flex: 0 0 auto;
      }

      .input-area {
        padding: 14px;
        padding-bottom: calc(18px + env(safe-area-inset-bottom));
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.96),
          rgba(0, 0, 0, 0.84)
        );
        display: flex;
        justify-content: center;
        align-items: flex-end;
        gap: 10px;
        flex: 0 0 auto;
      }

      .input-area textarea {
        flex: 0 1 680px;
        width: 100%;
        max-width: 680px;
        min-height: 56px;
        max-height: 180px;
        margin: 0 auto;
      }

      input,
      textarea {
        flex: 1;
        min-width: 0;
        padding: 16px 20px;
        border-radius: 30px;
        border: none;
        background: var(--input-bg);
        color: var(--text);
        font-size: 16px;
        outline: none;
        resize: none;
        overflow: hidden;
        transition:
          height 0.18s ease,
          box-shadow 0.18s ease,
          transform 0.18s ease,
          background 0.18s ease;
      }

      textarea {
        font-family: inherit;
      }

      #userInput {
        min-height: 56px;
        max-height: 180px;
        line-height: 1.45;
        padding-top: 16px;
        padding-bottom: 16px;
      }

      #userInput:focus {
        box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.18);
      }

      #userInput.is-typing {
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.22);
        transform: translateY(-1px);
      }

      input::placeholder {
        color: rgba(238, 250, 244, 0.62);
      }

      button {
        padding: 14px;
        background: linear-gradient(135deg, #e0c15a, #c59b22);
        color: #1f1806;
        border: none;
        border-radius: 50%;
        cursor: pointer;
        font-size: 18px;
        min-width: 48px;
        min-height: 48px;
        flex: 0 0 auto;
      }

      .install-btn {
        background: linear-gradient(135deg, #e0c15a, #c59b22);
        color: #1f1806;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 13px;
        cursor: pointer;
        min-width: auto;
        min-height: auto;
        white-space: nowrap;
      }
      .freud-weather-chip {
        height: 36px;
        min-width: 58px;
        padding: 0 10px;
        border-radius: 999px;

        display: inline-flex;
        align-items: center;
        justify-content: center;

        background: rgba(212, 175, 55, 0.16);
        border: 1px solid rgba(212, 175, 55, 0.38);
        color: #f3df9b;

        font-size: 0.82rem;
        font-weight: 900;
        white-space: nowrap;
      }

      .modal {
        display: none;
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.92);
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 16px;
      }

      .modal img {
        max-width: 90%;
        max-height: 90%;
        border-radius: 12px;
      }

      .message-content p {
        margin: 0 0 10px;
      }

      .message-content p:last-child {
        margin-bottom: 0;
      }

      .message-content ul,
      .message-content ol {
        margin: 8px 0 10px 20px;
        padding: 0;
      }

      .message-content li + li {
        margin-top: 4px;
      }

      .message-content strong {
        color: #f3df9b;
      }

      .code-block {
        margin: 10px 0;
        background: var(--code-bg);
        border: 1px solid var(--code-border);
        border-radius: 14px;
        overflow: hidden;
      }

      .code-label {
        padding: 8px 12px;
        font-size: 12px;
        color: var(--muted);
        border-bottom: 1px solid var(--code-border);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      pre {
        margin: 0;
        padding: 12px 14px;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 14px;
        line-height: 1.55;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        color: #f8f6ea;
      }

      .typing-row {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        min-height: 20px;
      }

      .typing-dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: #e0c15a;
        opacity: 0.5;
        animation: pulse 1.6s infinite ease-in-out;
      }

      .typing-dot:nth-child(2) {
        animation-delay: 0.15s;
      }

      .typing-dot:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.35;
        }
        50% {
          transform: translateY(-2px);
          opacity: 1;
        }
      }

      @media (max-width: 768px) {
        header {
          padding: calc(10px + env(safe-area-inset-top)) 12px 10px;
          align-items: center;
        }

        .avatar {
          width: 44px;
          height: 44px;
          flex-basis: 44px;
        }

        .header-left h1 {
          font-size: 1.05rem !important;
        }

        .header-left p {
          font-size: 0.82rem !important;
        }

        .install-btn {
          padding: 8px 12px;
          font-size: 12px;
          border-radius: 16px;
          align-self: center;
        }

        .chat {
          padding: 12px;
          gap: 12px;
        }

        .message {
          max-width: 98%;
          padding: 12px 14px;
          font-size: 15px;
          line-height: 1.5;
        }

        .input-area {
          padding: 10px;
          padding-bottom: calc(10px + env(safe-area-inset-bottom));
          gap: 6px;
        }

        input {
          padding: 14px 16px;
          font-size: 16px;
        }

        button {
          min-width: 44px;
          min-height: 44px;
          padding: 12px;
          font-size: 16px;
        }
      }

      @media (max-width: 480px) {
        header {
          padding: calc(10px + env(safe-area-inset-top)) 10px 10px;
          gap: 8px;
        }

        .header-left {
          gap: 10px;
        }

        .header-left h1 {
          font-size: 0.98rem !important;
        }

        .header-left p {
          font-size: 0.76rem !important;
        }

        .install-btn {
          padding: 7px 10px;
          font-size: 11px;
        }

        .chat {
          padding: 10px;
        }

        .message {
          max-width: 98%;
          font-size: 14px;
          padding: 11px 13px;
        }

        .status {
          font-size: 0.82rem;
          padding: 6px 10px;
        }

        .input-area {
          padding: 8px;
          padding-bottom: calc(8px + env(safe-area-inset-bottom));
          gap: 6px;
        }

        input {
          padding: 13px 14px;
          border-radius: 22px;
        }

        button {
          min-width: 42px;
          min-height: 42px;
          font-size: 15px;
          padding: 10px;
        }
      }

      .starred {
        border: 2px solid #d4af37;
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.45);
      }

      html,
      body {
        background: #03150f;
      }

      body::after {
        content: "";
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: env(safe-area-inset-bottom);
        background: #03150f;
        pointer-events: none;
        z-index: 1;
      }

      .message-actions {
        display: none;
      }

      .message-action-btn {
        width: 26px;
        height: 26px;
        min-width: 26px;
        min-height: 26px;
        padding: 0;
        border-radius: 999px;
        font-size: 0.78rem;
        line-height: 1;
        background: rgba(255, 255, 255, 0.1);
        color: var(--text);
        box-shadow: none;
      }

      .message-action-btn.star-active {
        background: linear-gradient(135deg, #e0c15a, #c59b22);
        color: #1f1806;
      }

      .user .message-action-btn {
        background: rgba(31, 24, 6, 0.16);
        color: #1f1806;
      }

      .message-sheet {
        position: fixed;
        left: 16px;
        right: 16px;
        bottom: 22px;
        z-index: 9999;

        background: rgba(0, 0, 0, 0.88);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(212, 175, 55, 0.22);
        border-radius: 22px;
        padding: 10px;
        display: none;
        gap: 8px;
      }

      .message-sheet.show {
        display: grid;
      }

      .message-sheet button {
        width: 100%;
        border-radius: 14px;
        padding: 14px;
        font-size: 15px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
      }

      .message-sheet .danger {
        color: #ff9b9b;
      }

      .message {
        animation: messageEnter 0.22s ease-out both;
      }

      @keyframes messageEnter {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.98);
        }

        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .notes-drawer {
        position: fixed;
        top: 0;
        right: 0;
        width: min(390px, 92vw);
        height: 100dvh;
        z-index: 1200;
        background: rgba(3, 21, 15, 0.96);
        border-left: 1px solid rgba(212, 175, 55, 0.38);
        box-shadow: -18px 0 60px rgba(0, 0, 0, 0.45);
        transform: translateX(105%);
        transition: transform 0.25s ease;
        display: flex;
        flex-direction: column;
        padding: calc(14px + env(safe-area-inset-top)) 14px 14px;
      }

      .notes-drawer.open {
        transform: translateX(0);
      }

      .notes-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }

      .notes-title {
        margin: 0;
        color: #f3df9b;
        font-size: 1.05rem;
      }

      .notes-close {
        width: 38px;
        height: 38px;
        min-width: 38px;
        min-height: 38px;
        padding: 0;
      }

      .notes-input {
        width: 100%;
        min-height: 120px;
        border-radius: 18px;
        margin-bottom: 10px;
      }

      .notes-save {
        width: 100%;
        border-radius: 16px;
        min-height: 44px;
        margin-bottom: 14px;
      }

      .notes-list {
        flex: 1;
        overflow-y: auto;
        display: grid;
        gap: 10px;
        padding-bottom: env(safe-area-inset-bottom);
      }

      .note-card {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(212, 175, 55, 0.22);
        border-radius: 16px;
        padding: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      .note-card small {
        display: block;
        color: var(--muted);
        margin-top: 8px;
        font-size: 0.75rem;
      }
      .notes-card {
        flex: 1 1 auto;
        min-height: 0;
        height: 100%;
        display: flex;
        flex-direction: column;
        background: rgba(255, 255, 255, 0.055);
        border: 1px solid rgba(212, 175, 55, 0.24);
        border-radius: 22px;
        overflow: hidden;
        backdrop-filter: blur(16px);
      }

      .notes-card .notes-input {
        flex: none;
        height: calc(100dvh - 265px);
        min-height: 260px;
        width: 100%;
        border-radius: 0;
        margin: 0;
        background: transparent;
        padding: 18px;
        overflow-y: auto !important;
        overflow-x: hidden !important;
        resize: none;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: thin;
        scrollbar-color: rgba(212, 175, 55, 0.45) transparent;
      }

      .notes-card .notes-input::-webkit-scrollbar {
        width: 6px;
      }

      .notes-card .notes-input::-webkit-scrollbar-track {
        background: transparent;
      }

      .notes-card .notes-input::-webkit-scrollbar-thumb {
        background: rgba(212, 175, 55, 0.42);
        border-radius: 999px;
      }

      .notes-card .notes-input::-webkit-scrollbar-thumb:hover {
        background: rgba(212, 175, 55, 0.62);
      }

      .notes-bottom-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 12px;
        border-top: 1px solid rgba(212, 175, 55, 0.18);
      }

      .notes-bottom-row small {
        color: var(--muted);
        font-size: 0.78rem;
      }

      .notes-save-mini {
        min-width: auto;
        min-height: 38px;
        height: 38px;
        border-radius: 999px;
        padding: 8px 14px;
        font-size: 0.9rem;
      }

      .notes-save {
        display: none;
      }

      .notes-list {
        display: none;
      }
      #authOpenBtn,
      #clearChatBtn,
      #installBtn,
      #freudSecurityBtn {
        min-width: 36px !important;
        min-height: 36px !important;
        width: 36px !important;
        height: 36px !important;
        padding: 0 !important;
        font-size: 14px !important;
        border-radius: 999px !important;
      }

      @media (max-width: 480px) {
        #installBtn {
          display: none !important;
        }
      }
      #authOpenBtn,
      #clearChatBtn,
      #installBtn,
      #freudSecurityBtn {
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        line-height: 1 !important;
        vertical-align: middle !important;
      }
      @media (max-width: 768px) {
        #installBtn {
          display: none !important;
        }
      }
      .notes-meta-stack {
        display: grid;
        gap: 3px;
      }

      #freudNoteCountdown {
        color: #f3df9b;
        font-weight: 700;
      }

      #freudNoteCountdown.is-empty {
        color: var(--muted);
        font-weight: 500;
      }
      .timed-notes-list {
        display: grid;
        gap: 6px;
        padding: 10px 12px;
        border-top: 1px solid rgba(212, 175, 55, 0.14);
        max-height: 130px;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: rgba(212, 175, 55, 0.45) transparent;
      }

      .timed-notes-list::-webkit-scrollbar {
        width: 6px;
      }

      .timed-notes-list::-webkit-scrollbar-track {
        background: transparent;
      }

      .timed-notes-list::-webkit-scrollbar-thumb {
        background: rgba(212, 175, 55, 0.42);
        border-radius: 999px;
      }

      .timed-notes-list::-webkit-scrollbar-thumb:hover {
        background: rgba(212, 175, 55, 0.62);
      }

      .timed-note-item {
        font-size: 0.78rem;
        line-height: 1.35;
        color: #f3df9b;
        background: rgba(212, 175, 55, 0.08);
        border: 1px solid rgba(212, 175, 55, 0.16);
        border-radius: 12px;
        padding: 7px 9px;
      }

      .timed-note-item small {
        display: block;
        color: var(--muted);
        margin-top: 2px;
      }
      /* =========================================================
   FREUD CENTER LOCK + SECURITY 01
   ========================================================= */
      .freud-lock-overlay {
        position: fixed;
        inset: 0;
        z-index: 3000;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(
            circle at 50% 28%,
            rgba(212, 175, 55, 0.16),
            transparent 32%
          ),
          linear-gradient(135deg, rgba(3, 21, 15, 0.96), rgba(11, 45, 34, 0.94));
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }

      body.freud-locked {
        overflow: hidden;
      }

      body.freud-locked .freud-lock-overlay {
        display: flex;
      }

      .freud-lock-card {
        width: min(420px, 92vw);
        padding: 34px 26px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.94);
        color: #10251d;
        border: 1px solid rgba(212, 175, 55, 0.32);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
        text-align: center;
      }

      .freud-lock-icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 16px;
        border-radius: 22px;
        display: grid;
        place-items: center;
        font-size: 1.85rem;
        background: linear-gradient(135deg, #e9c94f, #0fa968);
        box-shadow: 0 12px 28px rgba(15, 169, 104, 0.2);
      }

      .freud-lock-card h2 {
        margin: 0 0 8px;
        font-size: 2rem;
        line-height: 1.1;
        color: #0b3d2b;
      }

      .freud-lock-card p {
        margin: 0 0 20px;
        color: #5f746b;
        font-weight: 700;
        line-height: 1.35;
      }

      .freud-lock-card input {
        width: 100%;
        height: 58px;
        margin-bottom: 12px;
        border-radius: 18px;
        border: 1px solid rgba(11, 61, 43, 0.22);
        background: #fff;
        color: #10251d;
        font-size: 1rem;
        font-weight: 800;
      }

      .freud-lock-card input::placeholder {
        color: rgba(16, 37, 29, 0.42);
      }

      .freud-lock-card .freud-lock-primary {
        width: 100%;
        border-radius: 18px;
        min-height: 56px;
        margin-top: 4px;
        background: linear-gradient(135deg, #24b763, #129553);
        color: white;
        font-size: 1.05rem;
        font-weight: 900;
      }

      .freud-lock-message {
        min-height: 20px;
        color: #b84d4d;
        font-size: 0.86rem;
        font-weight: 800;
        margin: 2px 0 6px;
      }

      .freud-lock-link {
        margin-top: 10px;
        border: none;
        background: transparent;
        color: #5f746b;
        font-weight: 900;
        font-size: 0.85rem;
        min-width: auto;
        min-height: auto;
        padding: 0;
        border-radius: 0;
      }

      .freud-security-sheet {
        position: fixed;
        inset: 0;
        z-index: 2500;
        display: none;
        align-items: flex-end;
        justify-content: center;
        padding: 16px;
        background: rgba(0, 0, 0, 0.42);
      }

      .freud-security-sheet.open {
        display: flex;
      }

      .freud-security-card {
        width: min(420px, 100%);
        padding: 16px;
        border-radius: 24px;
        background: rgba(3, 21, 15, 0.98);
        border: 1px solid rgba(212, 175, 55, 0.32);
        box-shadow: 0 -18px 54px rgba(0, 0, 0, 0.38);
      }

      .freud-security-head {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #f3df9b;
        margin-bottom: 12px;
      }

      .freud-security-head span {

        const start = this.selectionStart;
        const end = this.selectionEnd;

        const beforeCursor = value.slice(0, start);
        const afterCursor = value.slice(end);

        const lines = beforeCursor.split("\n");
        const currentLine = lines[lines.length - 1];

        const numberedMatch = currentLine.match(/^(\s*)(\d+)\.\s(.*)$/);

        if (!numberedMatch) return;

        e.preventDefault();

        const indent = numberedMatch[1];
        const currentNumber = Number(numberedMatch[2]);
        const lineText = numberedMatch[3].trim();

        if (!lineText) {
          const removeCurrentNumber = beforeCursor.replace(
            new RegExp(`${indent}${currentNumber}\\.\\s$`),
            "",
          );

          this.value = removeCurrentNumber + afterCursor;
          this.selectionStart = this.selectionEnd = removeCurrentNumber.length;
          return;
        }

        const nextNumber = currentNumber + 1;
        const insertText = `\n${indent}${nextNumber}. `;

        this.value = beforeCursor + insertText + afterCursor;
        this.selectionStart = this.selectionEnd =
          beforeCursor.length + insertText.length;

      function scoreByOverlap(query, text) {
        const q = new Set(tokenize(query));
        if (!q.size) return 0;
        const t = new Set(tokenize(text));
        let score = 0;
        for (const word of q) {
          if (t.has(word)) score += 1;
        }
        return score;

        memory.session.forEach((item) => {
          const score = scoreByOverlap(query, item.text);
          if (score > 0)
            candidates.push({ kind: "session", score, text: item.text });
        });

        chatHistory
          .filter((msg) => msg.starred)
          .forEach((msg) => {
            const score = scoreByOverlap(query, msg.content) + 1;
            if (score > 1) {
              candidates.push({ kind: "starred", score, text: msg.content });
            }
          });

        return candidates
          .sort((a, b) => b.score - a.score)
          .slice(0, 4)
          .map((item) => `(${item.kind}) ${item.text}`);
      }

          <pre><code>${escapeHtml(code.trim())}</code></pre>
        </div>
      `;
            return;
          }

          const blocks = part
            .split(/\n\s*\n/)
            .map((block) => block.trim())
            .filter(Boolean);

          blocks.forEach((block) => {
            const lines = block
              .split("\n")
              .map((line) => line.trim())
              .filter(Boolean);

            const isBulletList = lines.every((line) => /^[-*]\s+/.test(line));

            const isNumberList = lines.every((line) =>
              /^\d+[.)]\s+/.test(line),
            );

            const hasNumberedLines = lines.some((line) =>
              /^\d+[.)]\s+/.test(line),
            );

            if (isBulletList) {
              html += `<ul>${lines
                .map(
                  (line) =>
                    `<li>${parseInline(line.replace(/^[-*]\s+/, ""))}</li>`,
                )
                .join("")}</ul>`;
            } else if (isNumberList) {
              html += `<ol>${lines
                .map(
                  (line) =>
                    `<li>${parseInline(line.replace(/^\d+[.)]\s+/, ""))}</li>`,
                )
                .join("")}</ol>`;
            } else if (hasNumberedLines) {
              html += lines
                .map((line) => `<p>${parseInline(line)}</p>`)
                .join("");
            } else {
              html += `<p>${parseInline(lines.join(" "))}</p>`;
            }
          });
        });

        return html;
      }

      function pickFreudVoice() {
        const voices = window.speechSynthesis?.getVoices?.() || [];

        return (
          voices.find((voice) =>
            /male|daniel|alex|fred|google uk english male/i.test(voice.name),
          ) ||
          voices.find((voice) => /en-US|en-GB/i.test(voice.lang)) ||
          voices[0] ||
          null
        );
      }

      function estimateVoiceSeconds(text) {
        return Math.max(
          4,
          Math.min(59, Math.round(String(text || "").length / 13)),
        );
      }
      function speakVoiceNoteText(text, bubble) {
        if (!("speechSynthesis" in window)) return;

        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(cleanVoiceText(text));
        const voice = pickFreudVoice();

        if (voice) utterance.voice = voice;

        utterance.rate = 0.82;
        utterance.pitch = 0.72;
        utterance.volume = 1;

        bubble.classList.add("is-playing");

        const playBtn = bubble.querySelector(".voice-note-play");
        if (playBtn) playBtn.textContent = "Ⅱ";

        function resetVoiceNoteButton() {
          bubble.classList.remove("is-playing");
          if (playBtn) playBtn.textContent = "▶";
        }

        utterance.onend = resetVoiceNoteButton;
        utterance.onerror = resetVoiceNoteButton;

        // iPhone fallback: sometimes onend does not fire cleanly
        setTimeout(
          resetVoiceNoteButton,
          estimateVoiceSeconds(text) * 1000 + 800,
        );

        window.speechSynthesis.speak(utterance);
      }

      function enforceTruth(reply, userText = "") {
        const lower = String(reply || "").toLowerCase();
        const userLower = String(userText || "").toLowerCase();

        const riskyPatterns = [
          "you mentioned earlier",
          "you said earlier",
          "we talked about",
          "as you said before",
          "i remember you said",
          "i remember now",
          "earlier you told me",
          "our conversation earlier",

          "when you said that",
          "that made me realize",
          "you were questioning me earlier",
          "you brought up",
          "you were saying",
          "you were telling me earlier",
        ];

        const hasRisk = riskyPatterns.some((p) => lower.includes(p));
        if (!hasRisk) return reply;

        const combinedHistory = [
          ...chatHistory.map((m) => m.content || ""),
          ...memory.saved.map((m) => m.text || ""),
          ...memory.session.map((m) => m.text || ""),

          .join(" ")
          .toLowerCase();

        let verified = false;

        for (const pattern of riskyPatterns) {
          if (lower.includes(pattern)) {

            if (slice && combinedHistory.includes(slice)) {
              verified = true;

        return reply

          .replace(

          .replace(
            /we talked about.*?\./gi,

          .replace(

      function detectFreudEmotionalPattern(text) {
        const lower = String(text || "").toLowerCase();

        if (
          /(tired|sleepy|exhausted|drained|past \d+\s*am|late night|can't sleep|cant sleep)/i.test(
            lower,
          )
        ) {
          return "User often needs gentler, shorter support when tired or late at night.";

        if (
          /(anxious|worried|scared|overwhelmed|stressed|pressure)/i.test(lower)
        ) {
          return "User may need calm reassurance first before practical advice when stressed.";
        }

        if (
          /(proud|happy|success|worked|fixed|beautiful|premium|accomplished)/i.test(
            lower,
          )
        ) {
          return "User appreciates shared celebration when progress or app improvements succeed.";
        }

        if (
          /(code|patch|css|html|javascript|error|console|github|deploy)/i.test(
            lower,
          )
        ) {
          return "User prefers exact technical guidance with minimal noise during coding work.";
        }

        return "";

          .filter((line) => !line.startsWith("✅"))
          .filter((line) => !/^\[x\]/i.test(line))
          .filter((line) => !/^- \[x\]/i.test(line))
          .filter(
            (line) =>
              line.startsWith("☐") ||
              /^\[\s*\]/.test(line) ||
              /^- \[\s*\]/.test(line),
          )
          .map((line) =>

      function markFreudChecklistDone(identifier) {
        const lines = getFreudChecklistLines();
        if (!lines.length)
          return { ok: false, message: "Your checklist is empty, babe." };

        const uncheckedIndexes = [];

        lines.forEach((line, index) => {
          if (
            line.startsWith("☐") ||
            /^\[\s*\]/.test(line) ||
            /^- \[\s*\]/.test(line)
          ) {
            uncheckedIndexes.push(index);
          }
        });

        const number = Number(String(identifier).match(/\d+/)?.[0] || 0);

        let targetIndex = -1;

        if (number > 0 && number <= uncheckedIndexes.length) {
          targetIndex = uncheckedIndexes[number - 1];
        } else {
          const needle = String(identifier)
            .toLowerCase()
            .replace(/^(mark|complete|done|finish|finished)\s+/i, "")
            .replace(/\s+(done|complete|completed|finished)$/i, "")
            .trim();

          targetIndex = lines.findIndex((line) => {
            const clean = line
              .replace(/^☐\s*/, "")
              .replace(/^\[\s*\]\s*/, "")
              .replace(/^- \[\s*\]\s*/, "")
              .toLowerCase();

            return clean.includes(needle) && line.startsWith("☐");
          });
        }

        if (targetIndex < 0) {
          return {
            ok: false,
            message: "I couldn’t find that active checklist item, babe.",
          };
        }

        const cleanText = lines[targetIndex]
          .replace(/^☐\s*/, "")
          .replace(/^\[\s*\]\s*/, "")
          .replace(/^- \[\s*\]\s*/, "")
          .trim();

        lines[targetIndex] = `☑ ${cleanText}`;
        setFreudChecklistMasterText(lines.join("\n"));

        return { ok: true, text: cleanText };
      }
      function handleNutriBridgeCommand(text) {

      function tryMathEvaluation(userText) {
        try {
          let expr = userText.toLowerCase();

          // convert phrases to math
          expr = expr
            .replace(/what is|calculate|compute/gi, "")
            .replace(/square root of (\d+)/gi, "Math.sqrt($1)")
            .replace(/divided by/gi, "/")
            .replace(/times|x/gi, "*")
            .replace(/plus/gi, "+")
            .replace(/minus/gi, "-");

          // remove non-math words
          expr = expr.replace(/[^0-9+\-*/().Mathsqrt ]/gi, "");

          const result = Function(`return ${expr}`)();

          if (isNaN(result)) return null;

          return result;
        } catch {
          return null;
        }
      }
      function enforceDirectAnswerFirst(reply, userText = "") {
        const user = String(userText || "")
          .toLowerCase()
          .trim();
        let text = String(reply || "").trim();
        if (!text) return text;

        const asksDirectQuestion =
          /^(what|why|how|is|are|do|does|did|can|could|should|would|will)\b/.test(
            user,
          ) || user.includes("?");

        if (!asksDirectQuestion) return text;

        if (
          /^(you'?re asking|we'?ve been here|déjà vu|seriously though|well[, ]|look[, ])/i.test(
            text,
          )
        ) {
          text = text.replace(
            /^(you'?re asking|we'?ve been here|déjà vu|seriously though|well[, ]|look[, ]).*?[.?!]\s*/i,
            "",
          );
        }

        return text.trim();
      }

      function addBusinessCaution(reply, userText = "") {
        const user = String(userText || "").toLowerCase();
        const text = String(reply || "");

        const relevant =
          /(business|market|investment|capital|startup|dubai|uae|middle east|next 2 years|plan)/i.test(
            user,
          );

        if (!relevant) return text;

        const alreadyHasCaution =
          /(regional situation|geopolitical|supply chain|cash flow|market conditions|stay flexible)/i.test(
            text,

        if (alreadyHasCaution) return text;

        return (
          text +

        );

      function formatSmartStructure(reply, userText = "") {
        const user = String(userText || "").toLowerCase();
        const text = String(reply || "").trim();

        const shouldStructure =
          /(business|plan|strategy|steps|requirements|capital|market|compare|example|start)/i.test(
            user,
          );

        if (!shouldStructure) return text;

        const alreadyStructured =
          /\n- |\n\d+\. |\n• /.test(text) ||
          text.includes("```") ||
          text.split("\n").length > 6;

        if (alreadyStructured) return text;

        const sentences = text
          .split(/(?<=[.!?])\s+/)
          .map((s) => s.trim())
          .filter(Boolean);

        if (sentences.length < 3) return text;

        const intro = sentences[0];
        const bullets = sentences
          .slice(1)
          .map((s) => `- ${s}`)
          .join("\n\n");

        return `${intro}\n\n${bullets}`;
      }

      function splitReplyIntoParts(reply, maxLength = 650) {
        const parts = [];
        let remaining = String(reply || "").trim();

        while (remaining.length > maxLength) {
          let cut = remaining.slice(0, maxLength);

          let cutIndex = Math.max(
            cut.lastIndexOf("\n- "),
            cut.lastIndexOf(". "),
            cut.lastIndexOf("! "),
            cut.lastIndexOf("? "),
            cut.lastIndexOf(" "),
          );

          if (cutIndex < 120) cutIndex = maxLength;

          const part = remaining.slice(0, cutIndex).trim();
          parts.push(part);
          remaining = remaining.slice(cutIndex).trim();
        }

        if (remaining) parts.push(remaining);
        return parts;
      }

        if (
          !(
            "SpeechRecognition" in window || "webkitSpeechRecognition" in window
          )
        ) {
          alert("Voice input requires Chrome or Edge.");
          return;
        }

        // Second tap = stop and send
        if (recognition) {
          voiceShouldSendOnEnd = true;

          try {
            recognition.stop();
          } catch (err) {
            console.warn("Recognition stop blocked:", err);
          }

          return;
        }

        pendingVoiceTranscript = "";
        voiceShouldSendOnEnd = false;

        recognition = new (
          window.SpeechRecognition || window.webkitSpeechRecognition
        )();
        recognition.lang = "en-US";
        recognition.interimResults = true;
        recognition.continuous = true;

        startVoiceRecordingUI();
        status.textContent = "Freud is listening 🎤";

        recognition.onresult = (event) => {
          let transcript = "";

          for (let i = 0; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript + " ";
          }

          pendingVoiceTranscript = transcript.trim();

          if (pendingVoiceTranscript) {
            status.textContent = "Voice captured — tap 🎤 to send 💚";
          }
        };

        recognition.onspeechend = () => {
          // Do nothing. User controls when to send by tapping 🎤 again.
          status.textContent = pendingVoiceTranscript
            ? "Voice captured — tap 🎤 to send 💚"
            : "Freud is still listening 🎤";
        };

        recognition.onerror = (event) => {
          console.warn("Freud voice recognition error:", event);

          if (event.error === "not-allowed") {
            alert("Microphone permission was blocked.");
          } else if (event.error === "no-speech") {
            status.textContent = "I didn't hear anything 💚";
          } else {
            status.textContent = "Voice listening interrupted 🎤";
          }

          stopVoiceRecordingUI();
          recognition = null;
          voiceShouldSendOnEnd = false;
        };

        recognition.onend = () => {
          const transcript = pendingVoiceTranscript.trim();
          const shouldSend = voiceShouldSendOnEnd && transcript;

          stopVoiceRecordingUI();

          recognition = null;
          voiceShouldSendOnEnd = false;

          if (!shouldSend) {
            if (!transcript) status.textContent = "I didn't hear anything 💚";
            return;
          }

          userInput.value = transcript;
          userInput.dispatchEvent(new Event("input"));

          pendingVoiceTranscript = "";

          setTimeout(() => {
            sendMessage(true);
          }, 120);
        };

        try {
          recognition.start();
        } catch (err) {
          console.warn("Recognition start blocked:", err);
          stopVoiceRecordingUI();
          recognition = null;
        }
      };

          /\b(\d{1,2})(?::(\d{2}))\s*(AM|PM|am|pm)?\b|\b(\d{1,2})\s*(AM|PM|am|pm)\b/,
        );

        if (!match) return null;

        let hour = Number(match[1] || match[4]);
        const minute = Number(match[2] || 0);
        const meridiem = (match[3] || match[5] || "").toLowerCase();

        if (minute < 0 || minute > 59) return null;

        if (meridiem) {
          if (hour < 1 || hour > 12) return null;
          if (meridiem === "pm" && hour !== 12) hour += 12;
          if (meridiem === "am" && hour === 12) hour = 0;
        } else {
          if (hour < 0 || hour > 23) return null;
        }

        const now = new Date();
        const target = new Date();
        target.setHours(hour, minute, 0, 0);

        if (target <= now) {
          target.setDate(target.getDate() + 1);
        }

        return {
          text,
          target,
        };
      }

      function getAllTimedNotes(text) {
        return String(text || "")
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean)
          .map(parseTimedNoteLine)
          .filter(Boolean)
          .sort((a, b) => a.target - b.target);
      }

      function getNextTimedNote(text) {
        const lines = String(text || "")
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean);

        const timed = lines
          .map(parseTimedNoteLine)
          .filter(Boolean)
          .sort((a, b) => a.target - b.target);

        return timed[0] || null;
      }

      function formatTimeRemaining(target) {
        const diffMs = target - new Date();

        if (diffMs <= 0) return "due now";

        const totalMinutes = Math.ceil(diffMs / 60000);
        const hours = Math.floor(totalMinutes / 60);
        const minutes = totalMinutes % 60;

        if (hours <= 0) return `in ${minutes}m`;
        return `in ${hours}h ${minutes}m`;
      }

      function updateFreudNoteCountdown() {
        if (!freudNoteCountdown || !freudNoteInput) return;

        const allTimedNotes = getAllTimedNotes(freudNoteInput.value);
        const nextTimed = allTimedNotes[0] || null;

        if (!nextTimed) {
          freudNoteCountdown.textContent = "No timed note";
          freudNoteCountdown.classList.add("is-empty");
          return;
        }

        freudNoteCountdown.classList.remove("is-empty");
        freudNoteCountdown.textContent = `⏰ ${nextTimed.text} • ${formatTimeRemaining(
          nextTimed.target,
        )}`;

        if (freudTimedNotesList) {
          if (!allTimedNotes.length) {
            freudTimedNotesList.innerHTML = "";
          } else {
            freudTimedNotesList.innerHTML = allTimedNotes
              .map(
                (item) => `
          <div class="timed-note-item">
            ⏰ ${escapeHtml(item.text)}
            <small>${formatTimeRemaining(item.target)}</small>
          </div>
        `,
              )
              .join("");
          }
        }
      }

      function startFreudNoteCountdown() {
        updateFreudNoteCountdown();

        if (freudNoteCountdownTimer) {
          clearInterval(freudNoteCountdownTimer);
        }

        freudNoteCountdownTimer = setInterval(updateFreudNoteCountdown, 60000);
      }

      function renderFreudNotes() {
        const note = loadFreudNotePad();

        if (!note) {
          freudNoteInput.value = "";
          freudNoteSavedAt.textContent = "Not saved yet";
          return;
        }

        freudNoteInput.value = note.text || "";
        freudNoteSavedAt.textContent = `Last saved: ${new Date(
          note.updatedAt || note.createdAt,
        ).toLocaleString()}`;
      }

      async function loadFreudNoteFromCloud() {
        // Local-only mode: notes are read from this browser only.
        renderFreudNotes();
      }

      async function saveFreudNoteToCloud() {
        // Local-only mode: no cloud save.
        return;
      }

      window.openNotesPanel = function () {
        notesDrawer.classList.add("open");
        renderFreudNotes();
        startFreudNoteCountdown();
        freudNoteInput.focus();
      };

      window.closeNotesPanel = function () {
        notesDrawer.classList.remove("open");
        if (freudNoteCountdownTimer) {
          clearInterval(freudNoteCountdownTimer);
          freudNoteCountdownTimer = null;
        }
      };

      window.saveFreudNote = function () {
        const text = freudNoteInput.value.trim();

        if (!text) return;

        const existing = loadFreudNotePad();

        const note = {
          id: existing?.id || generateId(),
          text,
          createdAt: existing?.createdAt || Date.now(),
          updatedAt: Date.now(),
        };

        saveFreudNotePad(note);
        renderFreudNotes();
      };

      function updateAuthUI() {
        authOpenBtn.textContent = "📝";
        authOpenBtn.title = "Notes";
        authOpenBtn.onclick = openNotesPanel;

        freudSecurityBtn.textContent = "🛡️";
        freudSecurityBtn.title = "Security";
        freudSecurityBtn.onclick = openFreudSecuritySheet;

        clearChatBtn.style.display = "inline-flex";
        appShell.style.display = "flex";
        memory = loadStructuredMemory();
        chatHistory = normalizeChatHistory(
          JSON.parse(localStorage.getItem(getStorageKeys().chat) || "[]"),
        );
        requestAnimationFrame(renderAllMessages);
        status.textContent = "Freud is here 💚";
        loadFreudMoodLine();
        loadFreudDisplayName();
      }

      window.showAuthModal = function () {
        openNotesPanel();
      };

      window.hideAuthModal = function () {
        return;
      };

      window.createFreudAccount = function () {
        alert("Freud is running in local-only mode. No login needed.");
      };

      window.signInFreud = function () {
        alert("Freud is running in local-only mode. No login needed.");
      };

      window.signOutFreud = function () {
        alert("Freud is running in local-only mode. No logout needed.");
      };

      async function initAuth() {
        currentUser = null;
        updateAuthUI();
      }

      // Groq wakes instantly through cloud request, no local model warmup needed.

      window.showInstallHelp = function () {
        alert(
          "For full install and offline behavior, run Freud through Live Server or GitHub Pages first, then open in Edge and install from there.",
        );
      };

      freudLockSubmit.addEventListener("click", handleFreudLockSubmit);
      freudLockSkip.addEventListener("click", closeFreudLock);

      freudLockPassword.addEventListener("keydown", (event) => {
        if (event.key === "Enter") handleFreudLockSubmit();
      });

      freudLockNew.addEventListener("keydown", (event) => {
        if (event.key === "Enter") handleFreudLockSubmit();
      });

      freudLockConfirm.addEventListener("keydown", (event) => {
        if (event.key === "Enter") handleFreudLockSubmit();
      });

      freudSecurityBtn.addEventListener("click", openFreudSecuritySheet);
      freudDisplayName.addEventListener("click", promptFreudRename);
      freudSecurityCancelBtn.addEventListener("click", closeFreudSecuritySheet);

      freudChangePasswordBtn.addEventListener("click", () => {
        closeFreudSecuritySheet();

        if (!localStorage.getItem(FREUD_LOCK_KEY)) {
          openFreudLock("setup");
          return;
        }

        openFreudLock("change");
      });

      freudDisablePasswordBtn.addEventListener("click", () => {
        closeFreudSecuritySheet();

        if (!localStorage.getItem(FREUD_LOCK_KEY)) {
          alert("No password is currently set.");
          return;
        }

        openFreudLock("disable");
      });

      freudLockNowBtn.addEventListener("click", () => {
        closeFreudSecuritySheet();
        openFreudLock("auto");
      });

      window.clearChat = function () {
        chatHistory = chatHistory.filter((msg) => msg.starred);
        saveChatHistory();
        renderAllMessages();
        status.textContent = "Freud kept your starred messages safe ⭐";
      };

      // Show lock immediately before heavier UI rendering.
      if (localStorage.getItem(FREUD_LOCK_KEY)) {
        openFreudLock("unlock");
      }

      // remove old blank messages that created action-only bubbles
      chatHistory = chatHistory.filter((msg) =>
        String(msg.content || "").trim(),
      );
      saveChatHistory();

      initAuth().then(() => {
        updateFreudWeatherChip();
        setInterval(updateFreudWeatherChip, 30 * 60 * 1000);
        setTimeout(() => {
          renderWelcomeIfNeeded();
          loadFreudNoteFromCloud();
        }, 60);
      });

      function startLivingStatus() {
        let index = 0;

        setInterval(() => {
          if (isGenerating) return;

          index = (index + 1) % FREUD_LIVING_STATUSES.length;
          status.textContent = FREUD_LIVING_STATUSES[index];
        }, 6500);
      }

      startLivingStatus();

      let activeMessageId = null;
      let justOpenedMessageSheet = false;

      function closeMessageSheet() {
        document.getElementById("messageSheet").classList.remove("show");
        activeMessageId = null;
      }

      function openMessageSheet(id) {
        activeMessageId = id;
        justOpenedMessageSheet = true;
        document.getElementById("messageSheet").classList.add("show");

        setTimeout(() => {
          justOpenedMessageSheet = false;
        }, 500);
      }

      document.getElementById("sheetCopyBtn").onclick = () => {
        const msg = chatHistory.find((m) => m.id === activeMessageId);
        if (msg) navigator.clipboard.writeText(msg.content || "");
        closeMessageSheet();
      };

      document.getElementById("sheetStarBtn").onclick = () => {
        const msg = chatHistory.find((m) => m.id === activeMessageId);
        if (msg) {
          msg.starred = !msg.starred;
          saveChatHistory();
          renderAllMessages();
        }
        closeMessageSheet();
      };

      document.getElementById("sheetDeleteBtn").onclick = () => {
        chatHistory = chatHistory.filter((m) => m.id !== activeMessageId);
        saveChatHistory();
        renderAllMessages();
        closeMessageSheet();
      };

      document.addEventListener("click", (e) => {
        if (justOpenedMessageSheet) return;

        if (
          !e.target.closest(".message-sheet") &&
          !e.target.closest(".message")
        ) {
          closeMessageSheet();
        }
      });
    </script>

    <div id="messageSheet" class="message-sheet">
      <button id="sheetStarBtn">⭐ Star</button>
      <button id="sheetCopyBtn">📋 Copy</button>
      <button id="sheetDeleteBtn" class="danger">🗑 Delete</button>
    </div>
  </body>
</html>
