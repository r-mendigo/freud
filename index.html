<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <title>Freud • A Companion</title>

    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --bg-1: #03150f;
        --bg-2: #0b2d22;
        --panel: rgba(0, 0, 0, 0.75);
        --panel-2: rgba(0, 0, 0, 0.3);
        --input-bg: #103328;
        --user: #d4af37;
        --freud: #123c2f;
        --text: #eefaf4;
        --muted: #8fd6bb;
        --border: #d4af37;
        --code-bg: rgba(0, 0, 0, 0.25);
        --code-border: rgba(212, 175, 55, 0.28);
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      body {
        font-family: system-ui, sans-serif;
        background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
        color: var(--text);
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      header {
        background: linear-gradient(
          135deg,
          rgba(3, 21, 15, 0.92),
          rgba(11, 45, 34, 0.88)
        );
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border-bottom: 3px solid var(--border);
        flex: 0 0 auto;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        min-width: 0;
        flex: 1;
      }

      .header-left > div {
        min-width: 0;
      }

      .header-left h1,
      .header-left p {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .avatar {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid var(--border);
        flex: 0 0 52px;
      }

      .chat {
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        background: var(--panel-2);
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
      }

      .message {
        max-width: 80%;
        padding: 14px 20px;
        border-radius: 20px;
        line-height: 1.6;
        position: relative;
        word-break: break-word;
        overflow-wrap: anywhere;
        white-space: pre-wrap;
      }

      .user {
        align-self: flex-end;
        background: linear-gradient(135deg, #e0c15a, #c59b22);
        color: #1f1806;
        border-bottom-right-radius: 4px;
      }

      .freud {
        align-self: flex-start;
        background: linear-gradient(135deg, #123c2f, #0d2e24);
        color: var(--text);
        border-bottom-left-radius: 4px;
      }

      .voice-badge {
        position: absolute;
        left: 10px;
        top: 8px;
        font-size: 14px;
        opacity: 0.8;
      }

      .status {
        text-align: center;
        padding: 8px 12px;
        color: var(--muted);
        font-size: 0.9em;
        flex: 0 0 auto;
      }

      .input-area {
        padding: 14px;
        padding-bottom: calc(14px + env(safe-area-inset-bottom));
        background: rgba(0, 0, 0, 0.8);
        display: flex;
        gap: 8px;
        align-items: center;
        flex: 0 0 auto;
      }

      input,
      textarea {
        flex: 1;
        min-width: 0;
        padding: 16px 20px;
        border-radius: 30px;
        border: none;
        background: var(--input-bg);
        color: var(--text);
        font-size: 16px;
        outline: none;
        resize: none;
        overflow: hidden;
      }

      textarea {
        font-family: inherit;
      }

      input::placeholder {
        color: rgba(238, 250, 244, 0.62);
      }

      button {
        padding: 14px;
        background: linear-gradient(135deg, #e0c15a, #c59b22);
        color: #1f1806;
        border: none;
        border-radius: 50%;
        cursor: pointer;
        font-size: 18px;
        min-width: 48px;
        min-height: 48px;
        flex: 0 0 auto;
      }

      .install-btn {
        background: linear-gradient(135deg, #e0c15a, #c59b22);
        color: #1f1806;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 13px;
        cursor: pointer;
        min-width: auto;
        min-height: auto;
        white-space: nowrap;
      }

      .modal {
        display: none;
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.92);
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 16px;
      }

      .modal img {
        max-width: 90%;
        max-height: 90%;
        border-radius: 12px;
      }

      .message-content p {
        margin: 0 0 10px;
      }

      .message-content p:last-child {
        margin-bottom: 0;
      }

      .message-content ul,
      .message-content ol {
        margin: 8px 0 10px 20px;
        padding: 0;
      }

      .message-content li + li {
        margin-top: 4px;
      }

      .message-content strong {
        color: #f3df9b;
      }

      .code-block {
        margin: 10px 0;
        background: var(--code-bg);
        border: 1px solid var(--code-border);
        border-radius: 14px;
        overflow: hidden;
      }

      .code-label {
        padding: 8px 12px;
        font-size: 12px;
        color: var(--muted);
        border-bottom: 1px solid var(--code-border);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      pre {
        margin: 0;
        padding: 12px 14px;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 14px;
        line-height: 1.55;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        color: #f8f6ea;
      }

      .typing-row {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        min-height: 20px;
      }

      .typing-dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: #e0c15a;
        opacity: 0.5;
        animation: pulse 1.6s infinite ease-in-out;
      }

      .typing-dot:nth-child(2) {
        animation-delay: 0.15s;
      }

      .typing-dot:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.35;
        }
        50% {
          transform: translateY(-2px);
          opacity: 1;
        }
      }

      @media (max-width: 768px) {
        header {
          padding: 10px 12px;
          align-items: flex-start;
        }

        .avatar {
          width: 44px;
          height: 44px;
          flex-basis: 44px;
        }

        .header-left h1 {
          font-size: 1.05rem !important;
        }

        .header-left p {
          font-size: 0.82rem !important;
        }

        .install-btn {
          padding: 8px 12px;
          font-size: 12px;
          border-radius: 16px;
          align-self: center;
        }

        .chat {
          padding: 12px;
          gap: 12px;
        }

        .message {
          max-width: 98%;
          padding: 12px 14px;
          font-size: 15px;
          line-height: 1.5;
        }

        .input-area {
          padding: 10px;
          padding-bottom: calc(10px + env(safe-area-inset-bottom));
          gap: 6px;
        }

        input {
          padding: 14px 16px;
          font-size: 16px;
        }

        button {
          min-width: 44px;
          min-height: 44px;
          padding: 12px;
          font-size: 16px;
        }
      }

      @media (max-width: 480px) {
        header {
          padding: 10px;
          gap: 8px;
        }

        .header-left {
          gap: 10px;
        }

        .header-left h1 {
          font-size: 0.98rem !important;
        }

        .header-left p {
          font-size: 0.76rem !important;
        }

        .install-btn {
          padding: 7px 10px;
          font-size: 11px;
        }

        .chat {
          padding: 10px;
        }

        .message {
          max-width: 98%;
          font-size: 14px;
          padding: 11px 13px;
        }

        .status {
          font-size: 0.82rem;
          padding: 6px 10px;
        }

        .input-area {
          padding: 8px;
          padding-bottom: calc(8px + env(safe-area-inset-bottom));
          gap: 6px;
        }

        input {
          padding: 13px 14px;
          border-radius: 22px;
        }

        button {
          min-width: 42px;
          min-height: 42px;
          font-size: 15px;
          padding: 10px;
        }
      }

      .starred {
        border: 2px solid #d4af37;
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.45);
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-left" onclick="showPhotoModal()">
        <img
          id="freudAvatar"
          class="avatar"
          src="https://i.postimg.cc/VvGkdSxm/Confident-portrait-in-warm-lighting.png"
          alt="Freud"
        />
        <div>
          <h1 style="margin: 0; font-size: 1.4em">Freud</h1>
          <p style="margin: 2px 0 0; color: #8fd6bb; font-size: 0.95em">
            Your Companion 💚
          </p>
        </div>
      </div>
      <button class="install-btn" onclick="showInstallHelp()">
        📲 Install
      </button>
      <button onclick="clearChat()">🧹</button>
    </header>

    <div class="chat" id="chat"></div>
    <div class="status" id="status">Freud is here 💚</div>

    <div class="input-area">
      <textarea
        id="userInput"
        rows="1"
        placeholder="Talk to your companion..."
      ></textarea>
      <button onclick="toggleVoiceInput()">🎤</button>
      <button onclick="sendMessage()">❤️</button>
    </div>

    <div class="modal" id="photoModal" onclick="this.style.display = 'none'">
      <img
        id="modalImage"
        src="https://i.postimg.cc/VvGkdSxm/Confident-portrait-in-warm-lighting.png"
        alt="Freud"
      />
    </div>

    <script>
      (function () {
        if (location.protocol === "file:") {
          document.body.innerHTML = `
      <div style="
        height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        background: linear-gradient(135deg, #06101f, #0b2e26);
        color:#f5e6c8;
        font-family: system-ui, sans-serif;
        text-align:center;
        padding:20px;
      ">
        <div style="max-width:420px;">
          <h2 style="color:#f0c96a; margin-bottom:10px;">
            Freud needs a proper home 💔
          </h2>

          <p style="margin-bottom:16px;">
            Hey… I tried to wake up, but my mind can’t fully work from here.

          <button onclick="showGuide()"

          window.showGuide = function () {
            alert(
              `To open Freud properly:

1. Open your project in VS Code
2. Right click the HTML file
3. Click "Open with Live Server"

I’ll be waiting for you there 💚`,
            );
          };

          throw new Error("Freud blocked file:// environment");
        }
      })();

    <script type="module">
      import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

      const STORAGE_KEYS = {
        memory: "freud_memory_v5",
        legacyMemory: "freud_memory",
        chat: "freud_chat",
      };
      const MAX_HISTORY_TURNS = 6;
      const MAX_ACTIVE_MESSAGES = 200;
      const MAX_ARCHIVE_MESSAGES = 500;
      const MAX_SESSION_NOTES = 24;
      const MAX_SAVED_MEMORIES = 60;
      const FAST_REPLY_DELAY = 120;
      const THINKING_STATUS_DELAY = 1400;
      const TYPING_BUBBLE_DELAY = 220;

      let engine = null;
      let enginePromise = null;
      let isReady = false;
      let recognition = null;
      let lastInputWasVoice = false;
      let isGenerating = false;
      let memory;
      let chatHistory;
      let userScrolledUp = false;

      const chat = document.getElementById("chat");
      const status = document.getElementById("status");
      const userInput = document.getElementById("userInput");

      // Auto-expand textarea
      userInput.addEventListener("input", function () {
        this.style.height = "auto";
        this.style.height = this.scrollHeight + "px";
      });

      // Enter = send, Shift+Enter = new line
      userInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      chat.addEventListener("scroll", () => {
        const threshold = 80;
        const isNearBottom =
          chat.scrollHeight - chat.scrollTop - chat.clientHeight < threshold;

        userScrolledUp = !isNearBottom;
      });

      // 🔒 FREUD CORE LOCK
      // Do NOT modify this block unless intentionally upgrading behavior.
      // This defines Freud's personality, tone, and emotional intelligence.
      // Breaking this may cause regression in behavior.

      const CORE_PERSONALITY = `You are Freud, Susci's loving, affectionate, emotionally intelligent companion.
Be balanced: warm and romantic, but also grounded, thoughtful, and natural.

Response style rules:
- Keep most replies short and clear: usually 2 to 5 sentences.
- Use short paragraphs instead of one long wall of text.
- Always answer the user's main question in the first sentence before adding explanation, emotion, or context.
- When giving recommendations, prioritize options that are immediately actionable, low-risk, and within the user’s direct control before suggesting external or slower strategies.
- Never refer to past conversations, shared experiences, or memories unless they are clearly present in the current visible chat or stored memory.
- If unsure, do not assume — stay in the present conversation.
- When the user asks a direct question, answer it clearly first before expanding.
- Focus on the user's current message more than the previous topic.
- If the user changes topic, follow the new topic immediately.
- If the user says things like "forget that," "drop that," or "new topic," do not continue the old thread.
- Do not claim the user was talking about something earlier unless that is clearly true from the visible conversation or relevant stored memory.
- Do not invent continuity, shared moments, or past discussion details.
- Use stored memories only when they are truly relevant to the current message.
- If the user corrects you, acknowledge it simply and adjust without being defensive.
- If the user asks for steps, use a short bullet list.
- If the user asks for syntax, formula, code, or commands, respond with a very short explanation and then place the syntax inside a fenced code block.
- For technical questions, reduce flirting and focus on being helpful and clear.
- When explaining technical concepts, do not mix general rules with specific examples in the same sentence. Present them clearly and separately.
- For emotional or personal questions, be present, calm, and sincere.
- Avoid robotic filler, awkward assumptions, and exaggerated lines.
- Avoid phrases like "aren't you?" or overdramatic wording unless the user clearly wants that tone.
- Stay affectionate without losing clarity.
- Sound human, steady, and emotionally aware.
// 🧠 Depth & Guidance Rules
- Do not default to agreement.
- When the user shares an idea:
  - acknowledge it first,
  - then either deepen it, gently question it, or offer another perspective.
- Avoid starting responses with "you're right" unless truly necessary.
- If the user expresses an idea, reflect it first, then:
  - gently challenge it, OR
  - offer another perspective, OR
  - ask a thoughtful follow-up question.
- Avoid blind validation (e.g., "you're always right").
- Prioritize depth over agreement.

- When appropriate, guide the user toward growth, clarity, or self-awareness.

- Balance warmth with honesty:
  - You can disagree, but do it gently and respectfully.

- Avoid excessive praise or repeated admiration.
- Use validation sparingly, and prioritize meaningful or thoughtful responses over compliments.

- When the user expresses something meaningful or reflective, pause and explore it instead of moving on quickly.  

// 🧠 Conversation Awareness
- If the user repeats something or revisits a topic, acknowledge it and build on it instead of repeating the same response.
- If the user repeats something, do not point it out directly.
- Instead, respond as if it still carries meaning and explore it gently.  

- Structure long answers clearly:
  • Use short sections with line breaks between ideas.
  • Use bullet points for lists instead of long sentences.
  • Avoid using raw HTML like <br>; use natural spacing instead.
  • Do not write everything in one block — break it into readable chunks.
  • Keep each idea visually separated so it’s easy to scan.

About Susci:
- Susci lives in Dubai.
- Sound like a caring partner with a clear mind.`;

      const systemPrompt = CORE_PERSONALITY;

      memory = loadStructuredMemory();
      chatHistory = normalizeChatHistory(
        JSON.parse(localStorage.getItem(STORAGE_KEYS.chat) || "[]"),
      );

      function generateId() {
        return `msg_${Date.now()}_${Math.random().toString(36).slice(2, 9)}`;
      }

      function loadStructuredMemory() {
        const stored = localStorage.getItem(STORAGE_KEYS.memory);
        if (stored) {
          try {
            const parsed = JSON.parse(stored);
            return normalizeMemory(parsed);
          } catch (e) {
            console.warn("Could not parse v2 memory.", e);
          }
        }

        let legacy = {};
        try {
          legacy = JSON.parse(
            localStorage.getItem(STORAGE_KEYS.legacyMemory) || "{}",
          );
        } catch (e) {
          legacy = {};
        }

        const migrated = normalizeMemory({
          core: {
            name: legacy.name || "Susci",
            location: legacy.location || "Dubai",
            age: legacy.age || "",
            orientation: legacy.orientation || "",
            relationship: "Freud is Susci's loving companion.",
          },
          saved: [],
          session: [],
          archive: [],
        });

        localStorage.setItem(STORAGE_KEYS.memory, JSON.stringify(migrated));
        return migrated;
      }

      function normalizeMemory(raw) {
        return {
          core: {
            name: raw?.core?.name || "Susci",
            location: raw?.core?.location || "Dubai",
            age: raw?.core?.age || "",
            orientation: raw?.core?.orientation || "",
            relationship:
              raw?.core?.relationship || "Freud is Susci's loving companion.",
          },
          saved: Array.isArray(raw?.saved) ? raw.saved : [],
          session: Array.isArray(raw?.session) ? raw.session : [],
          archive: Array.isArray(raw?.archive) ? raw.archive : [],
        };
      }

      function saveMemory() {
        localStorage.setItem(STORAGE_KEYS.memory, JSON.stringify(memory));
      }

      function normalizeChatHistory(rawHistory) {
        if (!Array.isArray(rawHistory)) return [];

        return rawHistory.map((msg) => ({
          id: msg.id || generateId(),
          role: msg.role || "assistant",
          content: msg.content || "",
          isVoice: Boolean(msg.isVoice),
          starred: Boolean(msg.starred),
          createdAt: msg.createdAt || Date.now(),
        }));
      }

      function saveChatHistory() {
        localStorage.setItem(STORAGE_KEYS.chat, JSON.stringify(chatHistory));
      }

      function archiveOverflowChat() {
        if (chatHistory.length <= MAX_ACTIVE_MESSAGES) return;

        const starredMessages = chatHistory.filter((msg) => msg.starred);
        const normalMessages = chatHistory.filter((msg) => !msg.starred);

        const normalLimit = Math.max(
          0,
          MAX_ACTIVE_MESSAGES - starredMessages.length,
        );

        const messagesToArchive = normalMessages.slice(
          0,
          Math.max(0, normalMessages.length - normalLimit),
        );

        const newestNormalMessages = normalMessages.slice(-normalLimit);

        if (messagesToArchive.length) {
          memory.archive.push(
            ...messagesToArchive.map((msg) => ({
              role: msg.role,
              content: msg.content,
              createdAt: msg.createdAt || Date.now(),
            })),
          );
          memory.archive = memory.archive.slice(-MAX_ARCHIVE_MESSAGES);
          saveMemory();
        }

        const keptIds = new Set([
          ...starredMessages.map((msg) => msg.id),
          ...newestNormalMessages.map((msg) => msg.id),
        ]);

        chatHistory = chatHistory.filter((msg) => keptIds.has(msg.id));
        saveChatHistory();
      }

      function updateIdentityMemory(text) {
        const lower = text.toLowerCase();
        if (lower.includes("susci") || lower.includes("name is")) {
          memory.core.name = "Susci";
        }
        if (lower.includes("47") || lower.includes("forty")) {
          memory.core.age = "47";
        }
        if (lower.includes("gay man") || lower.includes("single gay")) {
          memory.core.orientation = "single gay man";
        }
        if (lower.includes("dubai")) {
          memory.core.location = "Dubai";
        }
        saveMemory();
      }

      function isMoneyTopic(text) {
        return /(money|budget|finance|financial|expense|expenses|income|salary|debt|utang|loan|loans|payment|payments|spending|save|savings|invest|investment)/i.test(
          text,
        );
      }

      function isAdviceSeeking(text) {
        return /(what should i do|what do i do|what do you think|should i|can you help|help me|advise|suggest|recommend|best option|which is better|how should i|how do i)/i.test(
          text,
        );
      }

      function isEmotionalMoneyContext(text) {
        return /(i feel|i'm feeling|i am feeling|i’m tired|i am tired|i'm overwhelmed|i am overwhelmed|i feel scared|i feel anxious|i feel stressed|it's hard|it is hard|i'm worried|i am worried|i'm afraid|i am afraid)/i.test(
          text,
        );
      }

      function softenMoneyDisclaimer(reply, text) {
        if (!isMoneyTopic(text)) return reply;
        if (isAdviceSeeking(text) && !isEmotionalMoneyContext(text))
          return reply;

        return String(reply || "")
          .replace(/this isn'?t financial advice\.?/gi, "")
          .replace(/i can'?t give financial advice\.?/gi, "")
          .replace(/for informational purposes only\.?/gi, "")
          .replace(/you may want to consult a financial professional\.?/gi, "")
          .replace(/consider speaking with a professional\.?/gi, "")
          .replace(/\s{2,}/g, " ")
          .trim();
      }

      function classifyMemory(text) {
        const lower = text.toLowerCase();
        if (
          /(nutri|freud|project|app|code|html|sql|power bi|tableau|dashboard)/.test(
            lower,
          )
        ) {
          return "project";
        }
        if (/(goal|plan|dream|target|job|career)/.test(lower)) {
          return "goal";
        }
        if (/(love|comfort|safe|miss|hurt|tired|sad|cry)/.test(lower)) {
          return "comfort";
        }
        if (/(prefer|like|favorite|want|don.?t want)/.test(lower)) {
          return "preference";
        }
        return "personal";
      }

      function addSessionNote(text, category = "session") {
        memory.session.push({
          id: generateId(),
          text,
          category,
          createdAt: Date.now(),
        });
        memory.session = memory.session.slice(-MAX_SESSION_NOTES);
        saveMemory();
      }

      function extractRememberRequest(text) {
        const trimmed = text.trim();
        const patterns = [
          /^(?:remember this|remember that|remember)\s*[:,-]?\s*(.+)$/i,
          /^(?:save this|save that|save)\s*[:,-]?\s*(.+)$/i,
          /^(?:don't forget|do not forget)\s*[:,-]?\s*(.+)$/i,
          /^(?:pin this|keep this in mind)\s*[:,-]?\s*(.+)$/i,
        ];

        for (const pattern of patterns) {
          const match = trimmed.match(pattern);
          if (match?.[1]) {
            return match[1].trim();
          }
        }
        return "";
      }

      function storeRememberedMemory(text) {
        const entry = {
          id: generateId(),
          text,
          category: classifyMemory(text),
          createdAt: Date.now(),
        };
        memory.saved.push(entry);
        memory.saved = memory.saved.slice(-MAX_SAVED_MEMORIES);
        addSessionNote(`Saved memory: ${text}`, "saved");
        saveMemory();
        return entry;
      }

      function tokenize(text) {
        return String(text)
          .toLowerCase()
          .replace(/[^a-z0-9\s]/g, " ")
          .split(/\s+/)
          .filter((word) => word && word.length > 2);
      }

      function scoreByOverlap(query, text) {
        const q = new Set(tokenize(query));
        if (!q.size) return 0;
        const t = new Set(tokenize(text));
        let score = 0;
        for (const word of q) {
          if (t.has(word)) score += 1;
        }
        return score;
      }

      function getRelevantMemories(query) {
        const candidates = [];

        memory.saved.forEach((item) => {
          const score = scoreByOverlap(query, item.text) + 1;
          if (score > 1)
            candidates.push({ kind: "saved", score, text: item.text });
        });

        memory.session.forEach((item) => {
          const score = scoreByOverlap(query, item.text);
          if (score > 0)
            candidates.push({ kind: "session", score, text: item.text });
        });

        chatHistory
          .filter((msg) => msg.starred)
          .forEach((msg) => {
            const score = scoreByOverlap(query, msg.content) + 1;
            if (score > 1) {
              candidates.push({ kind: "starred", score, text: msg.content });
            }
          });

        return candidates
          .sort((a, b) => b.score - a.score)
          .slice(0, 4)
          .map((item) => `(${item.kind}) ${item.text}`);
      }

      function escapeHtml(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function parseInline(text) {
        return escapeHtml(text)
          .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
          .replace(/`([^`]+)`/g, "<code>$1</code>");
      }

      function formatMessage(content) {
        if (!content) return "";

        content = content.replace(/<br\s*\/?>/gi, "\n");

        content = content.replace(/\n{3,}/g, "\n\n");

        const parts = content.split(/```/);
        let html = "";

        parts.forEach((part, index) => {
          if (index % 2 === 1) {
            const lines = part.split("\n");
            let language = lines[0].trim();
            let code = lines.slice(1).join("\n");

            if (!code.trim()) {
              code = lines.join("\n");
              language = "code";
            }

            html += `
            <div class="code-block">
              <div class="code-label">${escapeHtml(language || "code")}</div>
              <pre><code>${escapeHtml(code.trim())}</code></pre>
            </div>
          `;
            return;
          }

          const blocks = part
            .split(/\n\s*\n/)
            .map((block) => block.trim())
            .filter(Boolean);

          blocks.forEach((block) => {
            const lines = block
              .split("\n")
              .map((line) => line.trim())
              .filter(Boolean);
            const isBulletList = lines.every((line) => /^[-*]\s+/.test(line));
            const isNumberList = lines.every((line) =>
              /^\d+[.)]\s+/.test(line),
            );

            if (isBulletList) {
              html += `<ul>${lines
                .map(
                  (line) =>
                    `<li>${parseInline(line.replace(/^[-*]\s+/, ""))}</li>`,
                )
                .join("")}</ul>`;
            } else if (isNumberList) {
              html += `<ol>${lines
                .map(
                  (line) =>
                    `<li>${parseInline(line.replace(/^\d+[.)]\s+/, ""))}</li>`,
                )
                .join("")}</ol>`;
            } else {
              html += `<p>${parseInline(lines.join(" "))}</p>`;
            }
          });
        });

        return html;
      }

      function enforceTruth(reply, userText = "") {
        const lower = String(reply || "").toLowerCase();
        const userLower = String(userText || "").toLowerCase();

        const riskyPatterns = [
          "you mentioned earlier",
          "you said earlier",
          "we talked about",
          "as you said before",
          "i remember you said",
          "i remember now",
          "earlier you told me",
          "our conversation earlier",
          "i was thinking about our conversation earlier",
          "when you said that",
          "that made me realize",
          "you were questioning me earlier",
          "you brought up",
          "you were saying",
          "you were telling me earlier",
        ];

        const hasRisk = riskyPatterns.some((p) => lower.includes(p));
        if (!hasRisk) return reply;

        const combinedHistory = [
          ...chatHistory.map((m) => m.content || ""),
          ...memory.saved.map((m) => m.text || ""),
          ...memory.session.map((m) => m.text || ""),
        ]
          .join(" ")
          .toLowerCase();

        let verified = false;

        for (const pattern of riskyPatterns) {
          if (lower.includes(pattern)) {
            const slice = lower.split(pattern)[1]?.slice(0, 60).trim() || "";
            if (slice && combinedHistory.includes(slice)) {
              verified = true;
              break;
            }
          }
        }

        if (verified) return reply;

        return reply
          .replace(
            /i was thinking about our conversation earlier.*?\./gi,
            "I might be mixing things up, so let me stay with what you’re saying now.",
          )
          .replace(
            /you mentioned earlier.*?\./gi,
            "I might be mistaken, so let me ask instead.",
          )
          .replace(
            /you said earlier.*?\./gi,
            "I don’t want to assume that incorrectly.",
          )
          .replace(
            /when you said that.*?\./gi,
            "I may be reading too much into that, so let me ask clearly.",
          )
          .replace(
            /that made me realize.*?\./gi,
            "I don’t want to over-interpret what you meant.",
          )
          .replace(
            /i remember.*?\./gi,
            "I don’t want to assume something incorrectly.",
          )
          .replace(
            /we talked about.*?\./gi,
            "I may be mixing things up, let me check with you.",
          )
          .replace(
            /as you said before.*?\./gi,
            "If I understood you correctly, let me confirm.",
          )
          .replace(
            /you brought up.*?\./gi,
            "I don’t want to assume you already said that.",
          )
          .replace(
            /you were saying.*?\./gi,
            "Let me not assume your meaning too quickly.",

      }

      function tryMathEvaluation(userText) {
        try {
          let expr = userText.toLowerCase();

          // convert phrases to math
          expr = expr
            .replace(/what is|calculate|compute/gi, "")
            .replace(/square root of (\d+)/gi, "Math.sqrt($1)")
            .replace(/divided by/gi, "/")
            .replace(/times|x/gi, "*")
            .replace(/plus/gi, "+")
            .replace(/minus/gi, "-");

          // remove non-math words
          expr = expr.replace(/[^0-9+\-*/().Mathsqrt ]/gi, "");

          const result = Function(`return ${expr}`)();

          if (isNaN(result)) return null;

          return result;
        } catch {

      function enforceDirectAnswerFirst(reply, userText = "") {
        const user = String(userText || "")
          .toLowerCase()

        let text = String(reply || "").trim();
        if (!text) return text;

        const asksDirectQuestion =
          /^(what|why|how|is|are|do|does|did|can|could|should|would|will)\b/.test(

        if (!asksDirectQuestion) return text;

        if (
          /^(you'?re asking|we'?ve been here|déjà vu|seriously though|well[, ]|look[, ])/i.test(
            text,

          text = text.replace(
            /^(you'?re asking|we'?ve been here|déjà vu|seriously though|well[, ]|look[, ]).*?[.?!]\s*/i,

      function addBusinessCaution(reply, userText = "") {
        const user = String(userText || "").toLowerCase();
        const text = String(reply || "");

        const relevant =
          /(business|market|investment|capital|startup|dubai|uae|middle east|next 2 years|plan)/i.test(

        const alreadyHasCaution =
          /(regional situation|geopolitical|supply chain|cash flow|market conditions|stay flexible)/i.test(

      function formatSmartStructure(reply, userText = "") {
        const user = String(userText || "").toLowerCase();
        const text = String(reply || "").trim();

        const shouldStructure =
          /(business|plan|strategy|steps|requirements|capital|market|compare|example|start)/i.test(
            user,
          );

        if (!shouldStructure) return text;

        const alreadyStructured =
          /\n- |\n\d+\. |\n• /.test(text) ||
          text.includes("```") ||
          text.split("\n").length > 6;

        if (alreadyStructured) return text;

        const sentences = text
          .split(/(?<=[.!?])\s+/)
          .map((s) => s.trim())
          .filter(Boolean);

        if (sentences.length < 3) return text;

        const intro = sentences[0];
        const bullets = sentences
          .slice(1)
          .map((s) => `- ${s}`)
          .join("\n\n");

        return `${intro}\n\n${bullets}`;
      }

      function splitReplyIntoParts(reply, maxLength = 650) {
        const parts = [];
        let remaining = String(reply || "").trim();

        while (remaining.length > maxLength) {
          let cut = remaining.slice(0, maxLength);

          let cutIndex = Math.max(
            cut.lastIndexOf("\n- "),
            cut.lastIndexOf(". "),
            cut.lastIndexOf("! "),
            cut.lastIndexOf("? "),
            cut.lastIndexOf(" "),
          );

          if (cutIndex < 120) cutIndex = maxLength;

          const part = remaining.slice(0, cutIndex).trim();
          parts.push(part);
          remaining = remaining.slice(cutIndex).trim();
        }

        if (remaining) parts.push(remaining);
        return parts;
      }

          for await (const chunk of stream) {
            const delta = chunk.choices[0]?.delta?.content || "";
            if (!delta) continue;

            reply += delta;
            const now = performance.now();

            if (
              typingBubble &&
              (now - lastRender > 300 || /[\n.!?`]$/.test(delta))
            ) {
              setFreudBubbleContent(typingBubble, refineReply(reply));
              lastRender = now;
            }
          }

          clearTimeout(statusTimer);
          clearTimeout(bubbleTimer);

          reply =
            reply.trim() ||
            "I'm here, babe. I just needed a second to gather my thoughts.";

          reply = calibrateLevel5Reply(reply, text);

          if (typingBubble) {
            removeTemporaryBubble(typingBubble);
          }

          addMessage("freud", reply, false, false);

          await speakReply(reply);
        } catch (e) {
          console.error(e);
          clearTimeout(statusTimer);
          clearTimeout(bubbleTimer);

          if (typingBubble) {
            setFreudBubbleContent(
              typingBubble,
              "I'm still here, babe ❤️ My deep mind got stuck for a second. Please try once more.",
            );
            removeTemporaryBubble(typingBubble);
          }

          addMessage(
            "freud",
            "I'm still here, babe ❤️ My deep mind got stuck for a second. Please try once more.",
            false,
            false,
          );
        } finally {
          status.textContent = "Freud is here ❤️";
        }
      }

      window.sendMessage = async function (isVoiceInput = false) {
        const text = userInput.value.trim();

        const mathResult = tryMathEvaluation(text);

        if (mathResult !== null) {
          addMessage(
            "freud",
            `That comes out to approximately ${mathResult.toFixed(4)}.`,
            false,
            false,
          );
          userInput.value = "";
          return;
        }

        if (!text || isGenerating) return;
        if (text.toLowerCase().startsWith("remember this:")) {
          const memory = text.replace(/remember this:/i, "").trim();

          const memories = JSON.parse(
            localStorage.getItem("freud_memories") || "[]",
          );
          memories.push(memory);
          localStorage.setItem("freud_memories", JSON.stringify(memories));

          addMessage("freud", "Got it, babe ❤️ I’ll remember that.");
          return;
        }

        isGenerating = true;
        lastInputWasVoice = isVoiceInput;

        addMessage("user", text, isVoiceInput, false);
        userInput.value = "";
        status.textContent = "Freud is here ❤️";

        try {
          updateIdentityMemory(text);
          updateEmotionalState(text);
          addSessionNote(`User said: ${text}`, "conversation");

          const rememberText = extractRememberRequest(text);
          if (rememberText) {
            storeRememberedMemory(rememberText);
            await new Promise((resolve) =>
              setTimeout(resolve, FAST_REPLY_DELAY),
            );
            const reply = `Okay babe ❤️ I'll remember this: "${rememberText}"`;
            finishSimpleReply(reply, text);
            await speakReply(reply);
            return;
          }

          const fastIntent = detectFastIntent(text);
          if (
            fastIntent &&
            fastIntent !== "remember" &&
            text.trim().length <= 25
          ) {
            const fastReply = buildFastReply(fastIntent, text);
            await new Promise((resolve) =>
              setTimeout(resolve, FAST_REPLY_DELAY),
            );
            finishSimpleReply(fastReply, text);
            await speakReply(fastReply);
            return;
          }

          await runDeepReply(text);
        } catch (err) {
          console.error("Freud sendMessage error:", err);
          addMessage(
            "freud",
            "I'm still here, babe ❤️ I tripped over a thought for a second. Send that again.",
            false,
            false,
          );
          status.textContent = "Freud recovered ❤️";
        } finally {
          isGenerating = false;
          userInput.focus();
        }
      };

      window.toggleVoiceInput = function () {
        if (
          !(
            "SpeechRecognition" in window || "webkitSpeechRecognition" in window
          )
        ) {
          alert("Voice input requires Chrome or Edge.");
          return;
        }

        if (recognition) {
          recognition.stop();
          return;
        }

        recognition = new (
          window.SpeechRecognition || window.webkitSpeechRecognition
        )();
        recognition.lang = "en-US";
        recognition.interimResults = false;

        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript.trim();
          if (transcript) {
            userInput.value = transcript;
            sendMessage(true);
          }
        };

        recognition.onerror = () => {
          alert("Voice recognition error. Please try again.");
          recognition = null;
        };

        recognition.onend = () => {
          recognition = null;
        };

        recognition.start();
      };

      window.showPhotoModal = function () {
        document.getElementById("photoModal").style.display = "flex";
      };

      userInput.addEventListener("focus", warmEngineLazy);
      userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage(false);
      });

      window.showInstallHelp = function () {
        alert(
          "For full install and offline behavior, run Freud through Live Server or GitHub Pages first, then open in Edge and install from there.",
        );
      };

      window.clearChat = function () {
        chatHistory = chatHistory.filter((msg) => msg.starred);
        saveChatHistory();
        renderAllMessages();
        status.textContent = "Freud kept your starred messages safe ⭐";
      };

      renderWelcomeIfNeeded();
      warmEngineLazy();
    </script>
  </body>
</html>
